<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>健好羽球營運系統 V5</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 18px;
    }

    .button {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-align: left;
      background: #eef4ff;
      color: #123;
    }

    .button:hover {
      background: #dfeaff;
    }

    .small {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>🏸 健好羽球營運系統 V5</h1>
      <div class="subtitle">請選擇要記錄的項目</div>

      <button class="button" onclick="go('/liff/income/')">💰 收入記帳</button>
      <button class="button" onclick="go('/liff/expense/')">💸 支出記帳</button>
      <button class="button" onclick="go('/liff/payment/')">🏦 幹部交款</button>
    </div>

    <div class="card small">
      目前版本：V5.1 Alpha<br />
      這是 LIFF 表單入口頁。下一步會加入收入、支出、交款表單。
    </div>
  </div>

  <script>
    function go(path) {
      window.location.href = path;
    }
  </script>
</body>
</html>
